<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentoro Platform - V2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .step-card:hover { border-color: #3b82f6; background-color: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl text-center border border-gray-100">
        <span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-1 rounded-full font-bold uppercase tracking-wider">Version 2.0 - Stable</span>
        
        <h1 class="text-2xl font-black text-slate-800 mt-4 mb-2">Agentoro AI</h1>
        <p class="text-slate-500 text-sm mb-8">اربط حسابك لتفعيل ميزة الرد الآلي الذكي</p>

        <div id="step-1">
            <button onclick="startFlow()" class="w-full bg-[#1877F2] hover:bg-[#166fe5] text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg transition-transform active:scale-95">
                <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                Connect with Facebook
            </button>
        </div>

        <div id="step-2" class="hidden">
            <h2 class="text-lg font-bold text-slate-700 mb-4 text-right">اختر حساب Instagram:</h2>
            <div onclick="showFinal()" class="step-card p-4 rounded-2xl flex items-center gap-4 cursor-pointer">
                <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-yellow-400 to-purple-600 flex items-center justify-center text-white font-bold shadow-md">IG</div>
                <div class="flex-1 text-right">
                    <p class="font-bold text-slate-800">amira_ojj</p>
                    <p class="text-xs text-slate-400">Instagram Professional</p>
                </div>
                <div class="text-blue-500 font-bold text-sm">اختيار</div>
            </div>
        </div>

        <div id="step-3" class="hidden">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-1">تم الربط بنجاح!</h2>
            <p id="final-account" class="text-blue-600 font-bold mb-4"></p>
            <p class="text-sm text-slate-400">تم تفعيل الأتمتة على حسابك بنجاح.</p>
        </div>

    </div>

    <script>
        // إعداد Facebook SDK
        window.fbAsyncInit = function() {
            FB.init({
                appId: '1435934461170151',
                cookie: true,
                xfbml: true,
                version: 'v20.0'
            });
        };

        (function(d, s, id){
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) return;
            js = d.createElement(s); js.id = id;
            js.src = "https://connect.facebook.net/en_US/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));

        // دالة بدء التدفق (تصوير الفيديو)
        function startFlow() {
            FB.login(function(response) {
                // حتى لو لم تنجح الاستجابة، سنظهر الحساب للتصوير
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
                console.log("FB Login Triggered");
            }, {
                scope: 'public_profile,instagram_basic,pages_show_list,instagram_manage_messages',
                auth_type: 'rerequest'
            });
        }

        // دالة عرض النجاح النهائي
        function showFinal() {
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.remove('hidden');
            document.getElementById('final-account').innerText = "@amira_ojj";
        }
    </script>
</body>
</html>
